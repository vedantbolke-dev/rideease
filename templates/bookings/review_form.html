{% extends 'base.html' %}
{% block title %}Write a Review — RideEase{% endblock %}
{% block content %}
<div class="container py-5 mt-5 d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="max-width:500px;width:100%;">
        <div class="card-header bg-white py-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-star-fill text-warning me-2"></i>Write a Review</h5>
        </div>
        <div class="card-body p-4">
            <p class="text-muted mb-3">Reviewing: <strong>{{ booking.bike.brand }} {{ booking.bike.name }}</strong></p>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-warning fw-semibold flex-fill">Submit Review</button>
                    <a href="{% url 'bookings:detail' booking.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
