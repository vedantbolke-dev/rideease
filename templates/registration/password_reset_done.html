{% extends 'base.html' %}
{% block title %}Password Reset — RideEase{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background:linear-gradient(135deg,#1a1a1a,#2d1a00);padding-top:80px!important;">
    <div class="card border-0 shadow-lg" style="max-width:420px;width:100%;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-lock-fill text-warning" style="font-size:2.5rem;"></i>
                <h4 class="fw-bold mt-2 mb-0">
Email Sent!</h4><p class='text-muted small'>Check your email for a password reset link.</p></div><div class='alert alert-success text-center'>A reset link has been sent to your email address.</div><a href="{% url 'users:login' %}" class='btn btn-warning w-100'>Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
