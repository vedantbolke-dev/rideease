{% extends 'base.html' %}
{% block title %}Password Reset — RideEase{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background:linear-gradient(135deg,#1a1a1a,#2d1a00);padding-top:80px!important;">
    <div class="card border-0 shadow-lg" style="max-width:420px;width:100%;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-lock-fill text-warning" style="font-size:2.5rem;"></i>
                <h4 class="fw-bold mt-2 mb-0">
Set New Password</h4></div><form method='post'>{% csrf_token %}{% for field in form %}<div class='mb-3'><label class='form-label small fw-semibold'>{{ field.label }}</label>{{ field }}</div>{% endfor %}<button type='submit' class='btn btn-warning w-100 fw-semibold'>Set New Password</button></form>
        </div>
    </div>
</div>
{% endblock %}
